name: fit_yourself
description: "Fit Yourself by Exercise - 30 Day Fitness & Diet Tracker"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.12
  firebase_auth: ^5.5.4
  firebase_storage: ^12.4.10
  google_sign_in: ^6.2.1

  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  table_calendar: ^3.0.9
  fl_chart: ^1.2.0
  google_fonts: ^8.1.0
  animated_text_kit: ^4.2.2
  percent_indicator: ^4.2.3
  intl: ^0.20.2
  path_provider: ^2.1.1
  flutter_animate: ^4.3.0
  flutter_firebase_chat_core: ^1.6.8
  image_picker: ^1.2.2
  google_generative_ai: ^0.4.5
  pedometer: ^4.0.1
  permission_handler: ^11.3.1
  share_plus: ^10.1.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
